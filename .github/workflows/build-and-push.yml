name: Build and Push Docker Images

on:
  push:
    branches: [prod, dev]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get build info
        run: |
          PARENTS=$(git log -1 --format="%P")
          PARENT_COUNT=$(echo $PARENTS | wc -w)
          if [ "$PARENT_COUNT" -gt 1 ]; then
            MERGE_TIP=$(echo $PARENTS | awk '{print $2}')
            MSG=$(git log -1 --format="%s" "$MERGE_TIP")
          else
            MSG=$(git log -1 --format="%s")
          fi
          MSG=$(echo "$MSG" | tr -d '"\\')
          if [ ${#MSG} -gt 60 ]; then
            MSG="${MSG:0:57}..."
          fi
          echo "COMMIT_MSG=${MSG:-update}" >> $GITHUB_ENV

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-dotnet
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/muenzbox-backend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/muenzbox-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/muenzbox-frontend:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/muenzbox-frontend:${{ github.sha }}
          build-args: |
            VITE_BUILD_NUMBER=${{ github.run_number }}
            VITE_COMMIT_MSG=${{ env.COMMIT_MSG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
