name: Auto merge AI branches to dev

on:
  push:
    branches:
      - claude**
      - codex**
  workflow_dispatch:

jobs:
  merge-to-dev:
    runs-on: self-hosted
    permissions:
      contents: write
      actions: write
    concurrency:
      group: auto-merge-ai-to-dev
      cancel-in-progress: false

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge source branch into dev
        env:
          SOURCE_BRANCH: ${{ github.ref_name }}
        run: |
          git fetch origin dev
          git checkout -B dev origin/dev
          git merge --no-ff --no-edit "origin/${SOURCE_BRANCH}"
          git push origin dev

      - name: Trigger build workflow on dev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-and-push.yml/dispatches" \
            -d '{"ref":"dev"}'
